name: pre-commit

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v6.3.0

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1
